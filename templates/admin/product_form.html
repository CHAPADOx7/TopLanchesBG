{% extends 'base.html' %}
{% block title %}{{ 'Editar' if produto else 'Novo' }} Produto | Admin TopLanchesBG{% endblock %}
{% block content %}
<section class="admin-shell">
    <div class="section-head">
        <div>
            <h2>{{ 'Editar' if produto else 'Novo' }} produto</h2>
            <p>Adicionar ou atualizar um item do catálogo.</p>
        </div>
        <a class="secondary-btn" href="{{ url_for('admin_products') }}">Voltar para lista</a>
    </div>
    <div class="form-panel">
        <form method="POST" action="" enctype="multipart/form-data">
            <label>Nome</label>
            <input type="text" name="nome" value="{{ produto.nome if produto else '' }}" required />
            <label>Descrição</label>
            <textarea name="descricao">{{ produto.descricao if produto else '' }}</textarea>
            <label>Categoria</label>
            <select name="categoria" required>
                <option value="lanches" {% if produto and produto.categoria == 'lanches' %}selected{% endif %}>Lanches</option>
                <option value="combos" {% if produto and produto.categoria == 'combos' %}selected{% endif %}>Combos</option>
                <option value="bebidas" {% if produto and produto.categoria == 'bebidas' %}selected{% endif %}>Bebidas</option>
                <option value="porcoes" {% if produto and produto.categoria == 'porcoes' %}selected{% endif %}>Porções</option>
                <option value="promocao" {% if produto and produto.categoria == 'promocao' %}selected{% endif %}>Promoção</option>
            </select>
            <label>Preço</label>
            <input type="number" step="0.01" name="preco" value="{{ produto.preco if produto else '' }}" required />
            <label>Estoque</label>
            <input type="number" name="estoque" value="{{ produto.estoque if produto else 0 }}" required />
            <label>Upload de imagem</label>
            <input type="file" name="imagem_file" accept="image/*" />
            <label>Ou caminho de imagem</label>
            <input type="text" name="imagem" value="{{ produto.imagem if produto else '' }}" placeholder="uploads/minha-foto.png" />
            <label><input type="checkbox" name="ativo" {% if produto and produto.ativo %}checked{% endif %} {% if not produto %}checked{% endif %}> Ativo</label>
            <button class="primary-btn" type="submit">Salvar</button>
        </form>
    </div>
</section>
{% endblock %}

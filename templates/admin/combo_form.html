{% extends 'base.html' %}
{% block title %}{{ 'Editar' if combo else 'Novo' }} Combo | Admin PitBull Lanches{% endblock %}
{% block content %}
<section class="admin-shell">
    <div class="section-head">
        <div>
            <h2>{{ 'Editar' if combo else 'Novo' }} combo</h2>
            <p>Cadastre ou atualize combos de produtos.</p>
        </div>
        <a class="secondary-btn" href="{{ url_for('admin_combos') }}">Voltar</a>
    </div>
    <div class="form-panel">
        <form method="POST" action="" enctype="multipart/form-data">
            <label>Nome</label>
            <input type="text" name="nome" value="{{ combo.nome if combo else '' }}" required />
            <label>Descrição</label>
            <textarea name="descricao">{{ combo.descricao if combo else '' }}</textarea>
            <label>Preço</label>
            <input type="number" step="0.01" name="preco" value="{{ combo.preco if combo else '' }}" required />
            <label>Upload de imagem</label>
            <input type="file" name="imagem_file" accept="image/*" />
            <label>Ou caminho de imagem</label>
            <input type="text" name="imagem" value="{{ combo.imagem if combo else '' }}" placeholder="combo.png" />
            <label>Validade</label>
            <input type="datetime-local" name="validade" value="{{ combo.validade.strftime('%Y-%m-%dT%H:%M') if combo and combo.validade else '' }}" />
            <label><input type="checkbox" name="ativo" {% if combo and combo.ativo %}checked{% endif %} {% if not combo %}checked{% endif %}> Ativo</label>
            <button class="primary-btn" type="submit">Salvar</button>
        </form>
    </div>
</section>
{% endblock %}
